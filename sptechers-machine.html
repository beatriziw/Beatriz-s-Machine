<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPTecher's Machine</title>
     <link rel="stylesheet" href="estilo.css" />
  <link rel="icon" href="assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body bgcolor="#00ffff">
    <center>
        <div class="header">
        <h1 class="titulo">SPTecher's Machine</h1>
        </div>
        </div>

        <div class="calculo">
        <div>
            <div class="box">
                 <img src="imagens/balao.png">
                 <div class="conteudo">
        <h3>Digite um número decimal:</h3>
        <input id="demo1" type="text" placeholder="Ex: 42">
          <br><br>

        <button onclick="converter()">Converter</button>
        </div>
        </div>
    <div class="img">
        <img src="imagens/gato.png">
    </div>
      
        </div>
        <div class=" resultados">
           
        <h3>Resultados:</h3>
         <br>
        <p>Octal:
        <div id="demo2"></div>
        </p>
         <br>
        <p>Hexadecimal:
        <div id="demo3"></div>
        </p>
         <br>
        <p>Binário:
        <div id="demo4"></div>
        </p>
        </div>
    </center>

    <script>
        function converter() {
            var decimal = Number(demo1.value);

            demo2.innerHTML = decimal.toString(8);
            demo3.innerHTML = decimal.toString(16);
            demo4.innerHTML = decimal.toString(2);
        }
    </script>
</body>

</html>
